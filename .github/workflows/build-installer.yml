name: Build Installer EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller winshell pywin32

      - name: Build FIST_CLICK_Setup.exe
        run: |
          cd installer
          pyinstaller installer.spec --noconfirm

      - name: Rename artifact
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag -or $tag -eq "") { $tag = "dev" }
          Copy-Item installer\dist\FIST_CLICK_Setup.exe FIST_CLICK_Setup_$tag.exe
        shell: pwsh

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "FIST CLICK ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          files: |
            FIST_CLICK_Setup_${{ github.ref_name }}.exe
          draft: false
          prerelease: false

      - name: Upload artifact (non-tag builds)
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: FIST_CLICK_Setup
          path: installer/dist/FIST_CLICK_Setup.exe
          retention-days: 7
