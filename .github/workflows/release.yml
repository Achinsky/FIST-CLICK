name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create ZIP archive
        run: |
          zip -r FIST-CLICK-${{ github.ref_name }}.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "dist/*" \
            --exclude "build/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FIST CLICK ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          files: |
            FIST-CLICK-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
